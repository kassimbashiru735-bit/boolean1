<!DOCTYPE html>
<html lang="en">
<head><meta name="monetag" content="4b6e607000b325393c672d431a97e6c3">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boolean1 Gallery</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f0f;
        color: white;
        text-align: center;
    }

    header {
        padding: 15px;
        background: #111;
        border-bottom: 2px solid orange;
        font-size: 20px;
        font-weight: bold;
        color: orange;
    }

    .container {
        max-width: 800px;
        margin: auto;
        padding: 20px;
    }

    img {
        width: 100%;
        max-height: 75vh;
        object-fit: contain;
        border-radius: 10px;
        border: 2px solid orange;
        background: black;
    }

    .controls {
        margin-top: 15px;
    }

    button {
        background: orange;
        border: none;
        padding: 10px 20px;
        margin: 5px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background: #ffb347;
    }

    .counter {
        margin-top: 10px;
        color: #aaa;
    }
</style>
</head>

<body>

<header>Boolean1 Gallery</header>

<div class="container">
    <img id="galleryImage" src="https://i.postimg.cc/VN9Nrsdb/file-00000000272c71fd9deb24f568e0f533.png">

    <div class="controls">
        <button onclick="prevImage()">Prev</button>
        <button onclick="nextImage()">Next</button>
    </div>

    <div class="counter" id="counter">1 / 10</div>
</div>

<script>
const images = [
"https://i.postimg.cc/VN9Nrsdb/file-00000000272c71fd9deb24f568e0f533.png",
"https://i.postimg.cc/FR9HjtLs/file-000000002cb071fdb08a99796ccb0a0b.png",
"https://i.postimg.cc/PqbqpfPn/file-00000000368471f4bcdb105f093a0398.png",
"https://i.postimg.cc/nLKLjVCZ/file-00000000475071f497aa31af23d48f17.png",
"https://i.postimg.cc/nzHhv8Dz/file-00000000536471f68ba25dae61c7afda.png",
"https://i.postimg.cc/FKbKdF7F/file-00000000a16071f487d5581763f850d9.png",
"https://i.postimg.cc/nLKLjVCD/file-00000000c8b471f69339d13e1f330876.png",
"https://i.postimg.cc/Z5dnmxmn/file-00000000c9d471f4b020a0cd19d1eaee.png",
"https://i.postimg.cc/9MWQG37z/file-00000000d1b071f583afc9ddca9c7100.png",
"https://i.postimg.cc/FKXRHks4/file-00000000f91c71f48bee29c41e5371a4.png"
];

let index = 0;

const img = document.getElementById("galleryImage");
const counter = document.getElementById("counter");

function updateImage() {
    img.src = images[index];
    counter.textContent = (index + 1) + " / " + images.length;
}

function nextImage() {
    index = (index + 1) % images.length;
    updateImage();
}

function prevImage() {
    index = (index - 1 + images.length) % images.length;
    updateImage();
}
</script>

</body>
</html>
